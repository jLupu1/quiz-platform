<div id="q{{ response.quiz_question.order_sequence }}" class="card shadow-sm mb-4 border-2 {% if response.marks_given > 0 %}border-success{% elif response.marks_given == 0 %}border-danger{% else %}border-warning{% endif %} w-100"
     style="min-height: 400px;">
    <div class="card-body p-4 p-md-5 position-relative d-flex flex-column">
        <div class="d-flex mb-4">
            <h4 class="fw-bold me-4">Q{{ response.quiz_question.order_sequence }}</h4>
            <div class="fs-5 w-100">
                {{ response.quiz_question.question.question_text|safe }}
            </div>
        </div>

        <div class="ps-md-5 mb-4">
            <label class="fw-bold text-muted mb-2 text-uppercase small">Your Response:</label>
            <textarea class="form-control fs-5 bg-light text-dark mb-3" rows="6" disabled>{{ response.text_answer|default:'[No Essay Provided]' }}</textarea>

            {% if response.manual_grading_feedback %}
                <div class="p-3 bg-warning-subtle border border-warning rounded-2 mt-3">
                    <span class="d-block fw-bold text-dark mb-1 small text-uppercase"><i class="bi bi-person-badge me-1"></i> Instructor Comment:</span>
                    <span class="text-dark">{{ response.manual_grading_feedback }}</span>
                </div>
            {% endif %}
        </div>

        {% include 'partials/review/review_feedback_footer.html' %}
    </div>
</div>
