<form hx-post="{% url 'question_engine' attempt.id quiz_question.id %}" 
      hx-target="#main-question-area" 
      hx-swap="innerHTML" 
      class="d-flex flex-column h-100">
    {% csrf_token %}

    <div class="d-flex align-items-start gap-4 mb-4">
        <h4 class="fw-bold mb-0 mt-1">Q{{ question_number }}</h4>
        <div class="flex-grow-1">
            <p class="fs-5 text-dark">{{ quiz_question.question.question_text }}</p>
        </div>
    </div>

    <div class="mb-3 flex-grow-1">
        <textarea class="form-control rounded-1 border-dark-subtle shadow-sm h-100" 
                  style="min-height: 250px;" 
                  name="answer_text" 
                  placeholder="Type your answer here...">{{ existing_response.answer_given|default_if_none:"" }}</textarea>
    </div>

    <div class="d-flex justify-content-between align-items-end mt-2">
        <div class="small">
            <p class="text-muted mb-0" style="font-size: 0.75rem;">Max words: {{ quiz_question.question.maximum_word_count|default:"No limit" }}</p>
        </div>
        
        <div class="d-flex align-items-center">
            {% if successfully_saved %}
                <span class="text-success fw-bold me-3"><i class="bi bi-check-circle-fill me-1"></i> Saved!</span>
            {% endif %}
            <button type="submit" class="btn btn-primary px-4 fw-bold rounded-1 shadow-sm">Save Answer</button>
        </div>
    </div>
</form>

{% if successfully_saved %}
<button id="sidebar-btn-{{ quiz_question.id }}" 
        class="btn btn-success btn-sm rounded-1 fw-bold shadow-sm"
        hx-get="{% url 'question_engine' attempt.id quiz_question.id %}"
        hx-target="#main-question-area"
        hx-swap="innerHTML"
        hx-swap-oob="true">
    {{ current_question_number }}
</button>
{% endif %}
