<div class="animation-fade-in w-100">
    {% if error %}
        <div class="alert alert-danger py-2 px-3 small mb-3 shadow-sm text-start">
            <i class="bi bi-exclamation-triangle-fill me-1"></i> {{ error }}
        </div>
    {% endif %}

    <form hx-post="{% url 'quiz_password_prompt' quiz.id %}"
          hx-target="#start-quiz-action-area"
          hx-swap="innerHTML"
          class="w-100">
        {% csrf_token %}

        <div class="input-group shadow-sm rounded-2 overflow-hidden mb-2">
            <span class="input-group-text bg-light border-primary"><i class="bi bi-key-fill text-primary"></i></span>
            <input type="password" name="quiz_password" class="form-control form-control-lg border-primary py-3" placeholder="Quiz Password" required autofocus>
        </div>

        <button class="btn btn-primary btn-lg w-100 fw-bold py-2 shadow-sm mb-2" type="submit">
            Submit Password
        </button>

        <button type="button" class="btn btn-link text-muted btn-sm text-decoration-none w-100" onClick="window.location.reload();">
            Cancel
        </button>
    </form>
</div>
