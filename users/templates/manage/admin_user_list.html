{% extends 'base.html' %}
{% load static %}

{% block title %} Manage Users {% endblock title %}

{% block content %}
<div class="container-fluid px-4 px-lg-5 mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="display-6 fw-bold mb-0 text-dark">Manage Users</h1>

        <div class="d-flex gap-3 align-items-center">
            <a href="{% url 'signup' %}" class="btn btn-primary rounded-2 shadow-sm">
                <i class="bi bi-plus-circle me-1"></i> New User
            </a>
        </div>
    </div>
    <div class="input-group shadow-sm mb-3" style="max-width: 300px;">
        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
        <input type="search"
               name="search"
               class="form-control border-start-0 ps-0"
               placeholder="Search for a user..."
               hx-get="{% url 'search_user' %}"
               hx-trigger="input changed delay:500ms, search"
               hx-target="#user-list-tbody">
    </div>

    <div class="card border-dark rounded-2 shadow-sm mb-5">
        <div class="card-body p-0">
            <div class="table-responsive">

                <table class="table table-hover align-middle mb-0">

                    <thead class="table-light border-bottom border-dark">
                        <tr>
                            <th scope="col" class="ps-4 py-3 text-secondary fw-bold">ID</th>
                            <th scope="col" class="py-3 text-secondary fw-bold">Username</th>
                            <th scope="col" class="py-3 text-secondary fw-bold">Full Name</th>
                            <th scope="col" class="py-3 text-secondary fw-bold">Email</th>
{#                            TODO filter by role#}
                            <th scope="col" class="py-3 text-secondary fw-bold">Role</th>

                            <th scope="col" class="pe-4 py-3 text-center text-secondary fw-bold">Manage</th>
                        </tr>
                    </thead>

                    <tbody id="user-list-tbody">
                        {% include 'partials/user_record_partial.html' %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
