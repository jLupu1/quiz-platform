{% extends 'base.html' %}
{% load static %}

{% block title %} Log In {% endblock %}
{% block extra_css %} <link rel="stylesheet" href="{% static 'users/css/login.css' %}"> {% endblock %}


{% block content %}
<div class="login-wrapper bg-light text-center">

    <form method="POST" class="form-signin">
        {% csrf_token %}
        <h1 class="h3 mb-3 fw-normal">Please sign in</h1>

        {{ form.username }}
        {{ form.password }}

        {% if form.errors %}
            <p class="text-danger small famil">Invalid username or password.</p>
        {% endif %}

        <button class="w-100 btn btn-lg btn-primary" type="submit">Sign in</button>
    </form>

</div>
{% endblock %}
