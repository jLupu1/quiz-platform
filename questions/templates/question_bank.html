{% extends 'base.html' %}

{% block title %}Questions Bank{% endblock %}

{% block content %}
<div class="container-fluid px-4 px-lg-5 mt-5">

        <a href="{% url 'course_detail' course.id %}" class="text-decoration-none text-muted mb-3 d-inline-block fw-medium transition-all hover-dark">
            <i class="bi bi-arrow-left me-1"></i> Back to Course
        </a>


    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="display-6 fw-bold mb-0 text-dark">Question Bank</h1>
    </div>

    <div class="input-group shadow-sm mb-3" style="max-width: 300px;">
        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
        <input type="search"
               name="search"
               class="form-control border-start-0 ps-0"
               placeholder="Search for a question..."
               hx-get="{% url 'search_questions' course.id%}"
               hx-trigger="input changed delay:500ms, search"
               hx-target="#list-tbody">
    </div>

    <div class="card border-dark rounded-2 shadow-sm mb-5">
        <div class="card-body p-0">
            <div class="table-responsive">

                <table class="table table-hover align-middle mb-0">

                    <thead class="table-light border-bottom border-dark">
                        <tr>
                            <th scope="col" class="py-3 text-secondary fw-bold">Question ID</th>
                            <th scope="col" class="py-3 text-secondary fw-bold">Question Text</th>
                            <th scope="col" class="py-3 text-secondary fw-bold">Question Type</th>
                            <th scope="col" class="pe-4 py-3 text-center text-secondary fw-bold">Edit</th>
                        </tr>
                    </thead>

                    <tbody id="list-tbody">
                        {% include 'partials/question_bank_record_partial.html' %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
