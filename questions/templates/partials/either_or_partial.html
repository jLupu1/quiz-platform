<div id="section-either_or" class="card border-0 shadow-sm rounded-4 mb-4 question-section">
    <div class="card-header bg-warning text-dark py-3">
        <h4 class="h5 mb-0 fw-bold"><i class="bi bi-toggle-on me-2"></i> Either/Or Settings</h4>
    </div>
    <div class="card-body p-4">
    {% for option in eo_options %}
        <div class="row g-3 align-items-end mb-4">
                <h4>Option {{ forloop.counter }}</h4>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Label (e.g., True, Yes) <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="eo_label_text" value="{{ option.label }}">
                </div>
                <div class="col-md-6">
                    <div class="form-check form-switch mb-2">
                        <label class="form-check-label fw-bold small">Correct?</label>
                        <input type="hidden" name="eo_is_correct_list" value="{{ option.is_correct|yesno:'True,False' }}">
                        <input class="form-check-input" type="checkbox" onchange="this.previousElementSibling.value = this.checked ? 'True' : 'False'" {% if option.is_correct %}checked{% endif %}>
                    </div>
                </div>
                <div class="col-12 mt-3">
                    <label class="form-label fw-bold">Specific Feedback</label>
                    <input type="text" class="form-control" name="eo_specific_feedback" value="{{ option.specific_feedback }}">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold small">Max Mark</label>
                    <input type="number" step="0.1" class="form-control" name="eo_max_mark" value="{{ option.maximum_mark }}">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold small">Negative Mark</label>
                    <input type="number" step="0.1" class="form-control" name="eo_negative_mark" value="{{ option.negative_mark }}">
                </div>
            </div>
    {% empty %}
{#    Creates two options for either/or#}
        {% for i in '12'%}
            <div class="row g-3 align-items-end mb-4">
                <h4>Option {{ i }}</h4>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Label (e.g., True, Yes) <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="eo_label_text">
                </div>
                <div class="col-md-6">
                    <div class="form-check form-switch mb-2">
                        <input type="hidden" name="eo_is_correct_list" value="False">
                        <input class="form-check-input" type="checkbox"
                               onchange="this.previousElementSibling.value = this.checked ? 'True' : 'False'">
                        <label class="form-check-label fw-bold small">Correct?</label>
                    </div>
                </div>
                <div class="col-12 mt-3">
                    <label class="form-label fw-bold">Specific Feedback</label>
                    <input type="text" class="form-control" name="eo_specific_feedback">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold small">Max Mark</label>
                    <input type="number" step="0.1" class="form-control" name="eo_max_mark">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold small">Negative Mark</label>
                    <input type="number" step="0.1" class="form-control" name="eo_negative_mark">
                </div>
            </div>
        {% endfor %}
    {% endfor %}
    </div>
</div>
