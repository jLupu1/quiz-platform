<div id="section-either_or" class="card border-0 shadow-sm rounded-4 mb-4 question-section">
    <div class="card-header bg-warning text-dark py-3">
        <h4 class="h5 mb-0 fw-bold"><i class="bi bi-toggle-on me-2"></i> Either/Or Settings</h4>
    </div>
    <div class="card-body p-4">
        <div class="row g-3 align-items-end">
            <div class="col-md-6">
                <label class="form-label fw-bold">Label (e.g., True, Yes)</label>
                <input type="text" class="form-control" name="eo_label">
            </div>
            <div class="col-md-6">
                <div class="form-check form-switch mb-2">
                    <input class="form-check-input" type="checkbox" name="eo_is_correct">
                    <label class="form-check-label fw-bold">Is Correct?</label>
                </div>
            </div>
            <div class="col-12 mt-3">
                <label class="form-label fw-bold">Specific Feedback</label>
                <input type="text" class="form-control" name="eo_specific_feedback">
            </div>
        </div>
    </div>
</div>
