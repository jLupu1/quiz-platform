{% for option in mcq_options %}
    <div class="border p-3 rounded bg-white mb-3 mcq-option-item position-relative">
        <div class="row g-3">
            <div class="col-md-8">
                <label class="form-label fw-bold small">Option Text</label>
                <input type="text" class="form-control" name="mcq_option_text" value="{{ option.option_text }}" required>
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold small">Max Mark</label>
                <input type="number" step="0.1" class="form-control" name="mcq_max_mark" value="{{ option.maximum_mark }}">
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold small">Negative Mark</label>
                <input type="number" step="0.1" class="form-control" name="mcq_negative_mark" value="{{ option.negative_mark }}">
            </div>
            <div class="col-md-10 mt-3">
                <label class="form-label fw-bold small">Option Feedback</label>
                <input type="text" class="form-control" name="mcq_option_feedback" value="{{ option.option_feedback }}">
            </div>
            <div class="col-md-2 mt-3 d-flex align-items-end">
                <div class="form-check form-switch mb-2">
                    <input type="hidden" name="mcq_is_correct_list" value="{{ option.is_correct|yesno:'True,False' }}">
                    <input class="form-check-input" type="checkbox" onchange="this.previousElementSibling.value = this.checked ? 'True' : 'False'" {% if option.is_correct %}checked{% endif %}>
                    <label class="form-check-label fw-bold small">Correct?</label>
                </div>
            </div>
            <div class="col-md-2 mt-3 d-flex align-items-end">
                <button type="button" class="btn btn-danger rounded" onclick="this.closest('.mcq-option-item').remove()">Delete</button>
            </div>
        </div>
    </div>

{% empty %}
    <div class="border p-3 rounded bg-white mb-3 mcq-option-item position-relative">
        <div class="row g-3">
            <div class="col-md-8">
                <label class="form-label fw-bold small">Option Text</label>
                <input type="text" class="form-control" name="mcq_option_text" required>
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold small">Max Mark</label>
                <input type="number" step="0.1" class="form-control" name="mcq_max_mark" value="0">
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold small">Negative Mark</label>
                <input type="number" step="0.1" class="form-control" name="mcq_negative_mark" value="0">
            </div>
            <div class="col-md-10 mt-3">
                <label class="form-label fw-bold small">Option Feedback</label>
                <input type="text" class="form-control" name="mcq_option_feedback">
            </div>
            <div class="col-md-2 mt-3 d-flex align-items-end">
                <div class="form-check form-switch mb-2">
                    <input type="hidden" name="mcq_is_correct_list" value="False">
                    <input class="form-check-input" type="checkbox" onchange="this.previousElementSibling.value = this.checked ? 'True' : 'False'">
                    <label class="form-check-label fw-bold small">Correct?</label>
                </div>
            </div>
            <div class="col-md-2 mt-3 d-flex align-items-end">
                <button type="button" class="btn btn-danger rounded" onclick="this.closest('.mcq-option-item').remove()">Delete</button>
            </div>
        </div>
    </div>
{% endfor %}
