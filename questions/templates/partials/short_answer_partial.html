<div id="section-short_answer" class="card border-0 shadow-sm rounded-4 mb-4 question-section">
    <div class="card-header bg-info text-white py-3">
        <h4 class="h5 mb-0 fw-bold"><i class="bi bi-text-left me-2"></i> Short Answer Settings</h4>
    </div>
    <div class="card-body p-4">
        <div class="row g-3">
            <div class="col-md-12">
                <label class="form-label fw-bold">Acceptable Answer</label>
                <input type="text" class="form-control" name="sa_answer" placeholder="e.g., Paris" value="{{ sa_options.answer_text }}">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">Max Word Count</label>
                <input type="number" class="form-control" name="sa_max_word" value="{{ sa_options.maximum_word_length }}">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">Use Case (Sensitivity)</label>
                <select class="form-select" name="sa_use_case">
                    <option value="0" {% if not sa_options.use_case %} selected {% endif %}>Case Insensitive (paris = Paris)</option>
                    <option value="1" {% if sa_options.use_case %} selected {% endif %}>Case Sensitive (Paris != paris)</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">Max Mark</label>
                <input type="number" step="0.1" class="form-control" name="sa_max_mark" value="{{ sa_options.maximum_mark }}">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold small">Negative Mark</label>
                <input type="number" step="0.1" class="form-control" name="sa_negative_mark" value="{{ sa_options.negative_mark }}">
            </div>
        </div>
    </div>
</div>
