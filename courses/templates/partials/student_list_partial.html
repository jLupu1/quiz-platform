{% for student in students %}
    <div class="list-group-flush d-flex justify-content-between align-items-center p-3">
        <span class="fw-medium">{{ student.get_full_name|default:student.username }}</span>
        <button class="btn btn-sm btn-light border">Manage</button>
    </div>
{% empty %}
    <div class="text-center p-4 text-muted border bg-light rounded">
        No students found matching your search.
    </div>
{% endfor %}
